services:
  postgres:
    image: postgres:16
    container_name: dental_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dental_user
      POSTGRES_PASSWORD: dental_pass
      POSTGRES_DB: dental_db
    ports:
      - "5432:5432"
    volumes:
      - dental_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_user -d dental_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dental_pg_data:
